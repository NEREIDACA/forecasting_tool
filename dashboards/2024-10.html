<style>

  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .ctrl-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .ctrl-btn.active { background: #065A82; color: #fff; border-color: #065A82; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .metric-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.85rem 1rem; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .metric-sub { font-size: 11px; color: var(--color-text-secondary); margin: 2px 0 0; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; }
  .chart-sub { font-size: 11px; color: var(--color-text-secondary); margin: 0 0 10px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .alert-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .alert-box { flex: 1; min-width: 180px; border-radius: var(--border-radius-md); padding: 0.65rem 0.85rem; border: 0.5px solid; font-size: 12px; }
  .alert-box.ok     { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
  .alert-box.warn   { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
  .alert-box.danger { background: #FCEBEB; color: #501313; border-color: #F09595; }
  .alert-icon  { font-size: 14px; margin-right: 4px; vertical-align: -2px; }
  .alert-label { font-weight: 500; }
  .horizon-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .horizon-row label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
  .horizon-row input[type=range] { flex: 1; }
  .horizon-row span { font-size: 13px; font-weight: 500; min-width: 60px; color: var(--color-text-primary); }
</style>

<div class="dash">
  <div class="top-bar">
    <div>
      <h3>Seasonal Forecast — Ter·Sau·Susqueda System</h3>

  <div class="alert-row"  id="alertRow"></div>
</div>

// ── Band dataset helper ───────────────────────────────────────────────────────
function bandDatasets(bands, h, color, label) {
  const s = d => d.slice(0, h);
  const ca = a => color.replace("1)", a + ")");
  const ds = [
    { label:"p80 hi",  data:s(bands.p90), borderWidth:0, pointRadius:0, fill:"+1", backgroundColor:ca("0.12"), tension:0.35 },
    { label:"p50 hi",  data:s(bands.p75), borderWidth:0, pointRadius:0, fill:"+1", backgroundColor:ca("0.22"), tension:0.35 },
    { label:"p50 lo",  data:s(bands.p25), borderWidth:0, pointRadius:0, fill:false, tension:0.35 },
    { label:"p80 lo",  data:s(bands.p10), borderWidth:0, pointRadius:0, fill:false, tension:0.35 },
    { label:label,     data:s(bands.med), borderColor:color, borderWidth:2, pointRadius:3, pointBackgroundColor:color, fill:false, tension:0.35 }
  ];
  if (bands.clim) {
    const climData = s(bands.clim);
    const hasClim = climData.some(v => v !== null);
    if (hasClim) ds.push({
      label: "Climatology",
      data: climData,
      borderColor: "#888780",
      borderWidth: 1.5,
      borderDash: [4, 4],
      pointRadius: 0,
      showLine: true,
      fill: false
    });
  }
  if (bands.obs) {
    const obsData = s(bands.obs);
    const hasObs = obsData.some(v => v !== null);
    if (hasObs) ds.push({
      label: "Observed",
      data: obsData,
      borderColor: "#2C2C2A",
      borderWidth: 0,
      pointRadius: 5,
      pointBackgroundColor: "#2C2C2A",
      pointBorderColor: "#fff",
      pointBorderWidth: 1.5,
      showLine: false,
      fill: false
    });
  }
  return ds;
}

    grid.appendChild(div);
    charts[cfg.id] = new Chart(document.getElementById(cfg.id).getContext("2d"), {
      type:"line",
      data:{ labels:MONTHS.slice(0,h), datasets:cfg.datasets },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:300},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${typeof c.raw==="number"?c.raw.toFixed(2):"—"}`}}
        },
        scales:{
          x:{ ticks:{color:textColor(),font:{size:11},autoSkip:false,maxRotation:0}, grid:{color:gridColor(),lineWidth:0.5} },
          y:{ title:{display:true,text:cfg.yLabel,color:textColor(),font:{size:11}}, ticks:{color:textColor(),font:{size:11}}, grid:{color:gridColor(),lineWidth:0.5} }
        }
      }
    });
  });
}

// ── Alerts ────────────────────────────────────────────────────────────────────
const ALERTS = {
  quantity:    `<div class="alert-box warn"><i class="ti ti-alert-triangle alert-icon"></i><span class="alert-label">Inflow outlook:</span> Total forecast inflow 139 hm³ — near-normal with significant ensemble spread.</div>
<div class="alert-box warn"><i class="ti ti-alert-triangle alert-icon"></i><span class="alert-label">Storage risk:</span> Storage may fall to 26% by diciembre. Review contingency thresholds.</div>`,
  temperature: `<div class="alert-box ok"><i class="ti ti-circle-check alert-icon"></i><span class="alert-label">Thermal conditions:</span> River temperature at Sau inlet 10.9°C mean — within normal seasonal range.</div>
<div class="alert-box ok"><i class="ti ti-circle-check alert-icon"></i><span class="alert-label">Coastal delivery:</span> Temperature at Ter mouth (p90) 18.1°C — normal range for the season.</div>`,
  reservoir:   `<div class="alert-box ok"><i class="ti ti-circle-check alert-icon"></i><span class="alert-label">Sau surface:</span> Surface temperature within normal range (max p90 19.9°C).</div>
<div class="alert-box ok"><i class="ti ti-circle-check alert-icon"></i><span class="alert-label">Susqueda surface:</span> Surface temperature within normal range (max p90 19°C).</div>`
};

function buildAlerts(v) { document.getElementById("alertRow").innerHTML = ALERTS[v]; }

function render() { buildMetrics(currentVar); buildCharts(currentVar, horizon); buildAlerts(currentVar); }

function switchVar(v) {
  currentVar = v;
  document.querySelectorAll("[data-var]").forEach(b => b.classList.toggle("active", b.dataset.var === v));
  render();
}

function onHorizon(v) {
  horizon = +v;
  document.getElementById("horizonLabel").textContent = v + (v==="1" ? " month" : " months");
  buildCharts(currentVar, horizon);
}

render();
</script>
